      var q = new URLSearchParams(window.location.search);
      var spa = q.get('_spa');
      if (spa) {

        var remaining = q.toString();
        var restored = spa + (remaining ? '?' + remaining : '');
        window.history.replaceState(null, '', restored);
      }
    })();
